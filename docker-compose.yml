version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: anomaly_detection
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: strong_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d anomaly_detection"]
      interval: 10s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Edge Server (FastAPI) ──
  edge_server:
    build:
      context: ./edge_server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:strong_password@postgres:5432/anomaly_detection
      REDIS_URL: redis://redis:6379/0
      EDGE_SERVER_HOST: "0.0.0.0"
      EDGE_SERVER_PORT: "8000"
    ports:
      - "8000:8000"

  # ── Dashboard (Flask) ──
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      DASHBOARD_SECRET_KEY: change-me-in-production
      DASHBOARD_PORT: "5000"
    ports:
      - "5000:5000"

volumes:
  pgdata:
