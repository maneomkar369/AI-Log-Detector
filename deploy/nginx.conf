# Nginx reverse proxy for Behavioral Anomaly Detector
# Handles SSL termination (optional) and proxies to both edge server and dashboard

upstream edge_server {
    server 127.0.0.1:8000;
}

upstream dashboard {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name your-domain.com;

    # Edge Server API + WebSocket
    location /ws/ {
        proxy_pass http://edge_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /api/ {
        proxy_pass http://edge_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
