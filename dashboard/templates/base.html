<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Anomaly Detector{% endblock %} — Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">🛡️</span>
            <span class="nav-title">Behavioral Anomaly Detector</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% block nav_logs %}{% endblock %}">📋 Live Logs</a>
            <a href="/alerts" class="nav-link {% block nav_alerts %}{% endblock %}">🚨 Alerts</a>
        </div>
        <div class="nav-status">
            <span id="connection-status" class="status-dot offline"></span>
            <span id="connection-text">Connecting...</span>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/dashboard.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
